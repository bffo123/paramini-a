<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para mi niña 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#0f0f1a,#1a0f1f);
color:white;
overflow:hidden;
}

/* LOGIN */
#login{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:rgba(0,0,0,0.6);
backdrop-filter:blur(20px);
padding:30px;
border-radius:20px;
box-shadow:0 0 40px rgba(255,0,150,0.5);
text-align:center;
}

.card h2{
color:#ff80bf;
text-shadow:0 0 10px rgba(255,128,191,0.8);
}

input{
margin-top:10px;
padding:12px;
border-radius:10px;
border:none;
background:#1f1f2e;
color:white;
width:200px;
}

button{
margin-top:10px;
padding:10px;
border-radius:10px;
border:none;
background:#ff4da6;
color:white;
cursor:pointer;
}

/* CONTENT */
#content{
display:none;
text-align:center;
padding-top:40px;
}

/* RAMO */
#ramo{
width:200px;
opacity:0;
transform:scale(0.5);
transition:1.5s;
margin-top:20px;
}

/* CHAT */
#chatBox{
height:200px;
overflow:auto;
background:rgba(0,0,0,0.4);
border-radius:10px;
padding:10px;
margin:20px auto;
width:300px;
}

</style>
</head>

<body>

<div id="login">
<div class="card">
<h2>💌 Para ti</h2>
<input id="pass" placeholder="Nuestra fecha">
<br>
<button onclick="entrar()">Entrar</button>
</div>
</div>

<div id="content">

<h1>Para mi niña 💖</h1>

<img id="ramo" src="https://pngimg.com/d/rose_bouquet_PNG35.png">

<div id="chatBox"></div>
<input id="inputChat" placeholder="Escribe algo...">
<button onclick="responder()">Enviar</button>

</div>

<script>
const PASSWORD="2111";
const apodos=["mi niña","mi bebé","mi cachetona"];

function apodo(){
return apodos[Math.floor(Math.random()*apodos.length)];
}

function entrar(){
if(pass.value===PASSWORD){
login.style.display="none";
content.style.display="block";

/* animar ramo */
setTimeout(()=>{
ramo.style.opacity=1;
ramo.style.transform="scale(1)";
},500);

} else alert("mal 😢");
}

/* IA MEJORADA */
function responder(){
let msg=inputChat.value.toLowerCase();
chatBox.innerHTML+="<div>💬 Tú: "+msg+"</div>";

let r="Me gusta leerte ❤️";

if(msg.includes("hola")) r="Hola "+apodo()+" 💖";
else if(msg.includes("que haces")) r="Pensando en ti obviamente "+apodo()+" 😏";
else if(msg.includes("como estas")) r="Mejor ahora que te leo 💕";
else if(msg.includes("te amo")) r="Yo te amo muchísimo más "+apodo()+" ❤️";
else if(msg.includes("extraño")) r="Yo también te extraño un montón 🥺";
else if(msg.includes("duermes")) r="Si tú duermes, yo sueño contigo 💭💖";
else if(msg.includes("vienes")) r="Siempre voy a estar contigo, aunque sea así 🫶";

setTimeout(()=>{
chatBox.innerHTML+="<div>🤖 Yo: "+r+"</div>";
chatBox.scrollTop=chatBox.scrollHeight;
},700);

inputChat.value="";
}
</script>

</body>
</html>
