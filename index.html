<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para mi bebe ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#0f0f1a,#1a0f1f);
color:white;
overflow:hidden;
}

/* LOGIN */
#login{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
padding:30px;
border-radius:20px;
box-shadow:0 0 40px rgba(255,0,150,0.3);
text-align:center;
}

input,button{
margin-top:10px;
padding:10px;
border-radius:10px;
border:none;
}

button{
background:#ff4da6;
color:white;
cursor:pointer;
}

/* CONTENT */
#content{
display:none;
text-align:center;
padding-top:40px;
}

h1{
font-weight:600;
color:#ff80bf;
}

/* CHAT */
#chatBox{
height:200px;
overflow:auto;
background:rgba(0,0,0,0.3);
border-radius:10px;
padding:10px;
margin:20px auto;
width:300px;
}

/* FLORES */
.flower{
position:absolute;
bottom:-80px;
width:40px;
animation:floatUp linear infinite;
}

@keyframes floatUp{
to{
transform:translateY(-110vh);
opacity:0;
}
}
</style>
</head>

<body>

<div id="login">
<div class="card">
<h2>💌 Para mi meme titita :3</h2>
<input id="pass" placeholder="Nuestra fecha">
<br>
<button onclick="entrar()">Entrar</button>
</div>
</div>

<div id="content">

<h1>Para mi niña 💖</h1>

<div id="chatBox"></div>
<input id="inputChat" placeholder="Escribe algo...">
<button onclick="responder()">Enviar</button>

</div>

<script>
const PASSWORD="2111";
const apodos=["mi niña","mi bebé","mi cachetona"];

function apodo(){
return apodos[Math.floor(Math.random()*apodos.length)];
}

function entrar(){
if(pass.value===PASSWORD){
login.style.display="none";
content.style.display="block";
flores();
} else alert("mal :c");
}

/* IA LIMPIA */
function responder(){
let msg=inputChat.value;
chatBox.innerHTML+="<div>💬 Tú: "+msg+"</div>";

let r="Me gusta leerte ❤️";

if(msg.toLowerCase().includes("hola")) r="Hola "+apodo()+" 💖";
if(msg.toLowerCase().includes("te amo")) r="Yo te amo mucho más "+apodo()+" ❤️";
if(msg.toLowerCase().includes("extraño")) r="Yo también te extraño 🥺";

setTimeout(()=>{
chatBox.innerHTML+="<div>🤖 Yo: "+r+"</div>";
chatBox.scrollTop=chatBox.scrollHeight;
},800);
}

/* FLORES BONITAS */
function flores(){
for(let i=0;i<15;i++){
let f=document.createElement("img");
f.src="https://cdn-icons-png.flaticon.com/512/869/869869.png";
f.className="flower";
f.style.left=Math.random()*100+"vw";
f.style.animationDuration=(6+Math.random()*4)+"s";
document.body.appendChild(f);
}
}
</script>

</body>
</html>
